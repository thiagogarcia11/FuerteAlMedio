<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuerteAlMedio — Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ── */
    :root {
      --bg:        #0e0e0e;
      --surface:   #181818;
      --border:    #2a2a2a;
      --accent:    #c8f000;       /* verde césped eléctrico */
      --text:      #f0f0f0;
      --muted:     #888;
      --radius:    10px;
      --sidebar-w: 220px;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .header-meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Layout principal ── */
    .layout {
      display: flex;
      min-height: calc(100vh - 60px);
    }

    /* ── Sidebar de filtros ── */
    aside#filtros {
      width: var(--sidebar-w);
      flex-shrink: 0;
      padding: 1.5rem 1rem;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .filtro-seccion {
      margin-bottom: 1.8rem;
    }

    .filtro-titulo {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .filtro-lista {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    /* Botón de filtro individual */
    .filtro-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      text-align: left;
      font-size: 0.9rem;
      color: var(--text);
      width: 100%;
      transition: all 0.15s;
    }

    .filtro-btn:hover {
      border-color: var(--border);
      background: var(--surface);
    }

    .filtro-btn.activo {
      background: var(--accent);
      color: #000;
      font-weight: 600;
      border-color: var(--accent);
    }

    /* Sección de modelos — oculta hasta que se elija marca */
    #filtro-modelos {
      display: none;
    }

    /* ── Área de productos ── */
    main {
      flex: 1;
      padding: 1.5rem 2rem;
    }

    .main-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .main-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 1px;
    }

    #contador-productos {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ── Grilla de productos ── */
    #grilla-productos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card de producto ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    .card-imagen {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--border); /* placeholder mientras no hay imagen */
      display: block;
    }

    .card-body {
      padding: 0.9rem;
    }

    .card-marca {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .card-nombre {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .card-color {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* Selector de talles */
    .talles-label {
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .talles-lista {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-bottom: 0.9rem;
    }

    .talle-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      color: var(--text);
      transition: all 0.15s;
    }

    .talle-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .talle-btn.seleccionado {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* Footer de la card */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-precio {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: var(--accent);
    }

    .btn-ver {
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.15s;
      margin-left: auto;
    }

    .btn-ver:hover {
      background: var(--accent);
      color: #000;
    }

    .btn-comprar {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 0.45rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: opacity 0.15s;
    }

    .btn-comprar:hover { opacity: 0.85; }

    /* Estado deshabilitado si no hay talle seleccionado */
    .btn-comprar:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Badge "destacado" */
    .badge-destacado {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      margin-bottom: 0.5rem;
    }

    /* ── Estado vacío ── */
    #estado-vacio {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    #estado-vacio p { font-size: 1rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-overlay.activo {
      display: flex;
    }

    /* Contenedor del modal */
    .modal-contenido {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 860px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      gap: 0;
      position: relative;
    }

    /* Botón cerrar */
    .modal-cerrar {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--border);
      border: none;
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.15s;
    }

    .modal-cerrar:hover { background: #444; }

    /* ── Columna izquierda: fotos ── */
    .modal-fotos {
      width: 55%;
      flex-shrink: 0;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Foto principal */
    .modal-foto-principal {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .modal-foto-principal img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Flechas de navegación */
    .modal-flecha {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 5;
    }

    .modal-flecha:hover { background: rgba(0,0,0,0.9); }
    .modal-flecha.prev { left: 0.5rem; }
    .modal-flecha.next { right: 0.5rem; }

    /* Miniaturas */
    .modal-miniaturas {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .modal-miniatura {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .modal-miniatura:hover { border-color: var(--muted); }
    .modal-miniatura.activa { border-color: var(--accent); }

    /* ── Columna derecha: info ── */
    .modal-info {
      flex: 1;
      padding: 2rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border-left: 1px solid var(--border);
    }

    .modal-marca {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .modal-nombre {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 1px;
      line-height: 1.1;
    }

    .modal-color-tipo {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .modal-precio {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .modal-descripcion {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    /* Talles en el modal */
    .modal-talles-label {
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .modal-talles-lista {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    /* Botón WhatsApp */
    .modal-btn-whatsapp {
      margin-top: auto;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: opacity 0.15s;
    }

    .modal-btn-whatsapp:hover { opacity: 0.88; }
    .modal-btn-whatsapp:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Responsive: modal en móvil ── */
    @media (max-width: 640px) {
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal-contenido {
        flex-direction: column;
        border-radius: 14px 14px 0 0;
        max-height: 95vh;
      }
      .modal-fotos { width: 100%; padding: 1rem; }
      .modal-info { border-left: none; border-top: 1px solid var(--border); padding: 1rem; }
      .modal-nombre { font-size: 1.3rem; }
      .modal-precio { font-size: 1.6rem; }
      /* Talles más grandes para el dedo */
      .talle-btn, .modal-talles-lista .talle-btn {
        min-width: 44px;
        min-height: 44px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-btn-whatsapp { padding: 1rem; font-size: 1rem; min-height: 52px; }
      .modal-flecha { width: 44px; height: 44px; font-size: 1.3rem; }
    }

    /* ── Botón flotante "Filtrar" (solo móvil) ── */
    #btn-filtrar-mobile {
      display: none;
    }

    @media (max-width: 768px) {
      /* Ocultar sidebar */
      aside#filtros { display: none; }

      /* Mostrar botón flotante */
      #btn-filtrar-mobile {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        position: fixed;
        bottom: 1.25rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 50px;
        padding: 0.7rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        z-index: 150;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        white-space: nowrap;
      }

      main { padding: 1rem; padding-bottom: 5rem; }

      header { padding: 0.75rem 1rem; }
      .logo { font-size: 1.4rem; }
      .header-meta { display: none; }

      #grilla-productos {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0.75rem;
      }
    }

    /* ── Bottom sheet de filtros ── */
    #filtros-sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 300;
    }

    #filtros-sheet-overlay.activo { display: block; }

    #filtros-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-radius: 18px 18px 0 0;
      border-top: 1px solid var(--border);
      z-index: 301;
      padding: 1.25rem 1.25rem 2rem;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 80vh;
      overflow-y: auto;
    }

    #filtros-sheet.activo { transform: translateY(0); }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 1.25rem;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .sheet-titulo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }

    .sheet-limpiar {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: underline;
    }

    /* Filtros dentro del sheet en horizontal */
    .sheet-filtros {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .sheet-filtros .filtro-lista {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .sheet-filtros .filtro-btn {
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      min-height: 36px;
      width: auto;
    }

    #sheet-filtro-modelos { display: none; }

    .sheet-aplicar {
      margin-top: 1.5rem;
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      min-height: 52px;
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <span class="logo">FuerteAlMedio</span>
    <span class="header-meta">Championes importados · Calidad AAA</span>
  </header>

  <div class="layout">

    <!-- ── Sidebar de filtros ── -->
    <aside id="filtros">

      <div class="filtro-seccion" id="filtro-tipo">
        <p class="filtro-titulo">Tipo</p>
        <ul class="filtro-lista">
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="todos">Todos</button></li>
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="11">Fútbol 11</button></li>
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="5">Fútbol 5</button></li>
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="Sala">Futsal / Sala</button></li>
        </ul>
      </div>

      <div class="filtro-seccion" id="filtro-marca">
        <p class="filtro-titulo">Marca</p>
        <!-- JS genera los botones dinámicamente desde products.js -->
        <ul class="filtro-lista" id="lista-marcas"></ul>
      </div>

      <div class="filtro-seccion" id="filtro-modelos">
        <p class="filtro-titulo">Modelo</p>
        <!-- JS genera los botones cuando se selecciona una marca -->
        <ul class="filtro-lista" id="lista-modelos"></ul>
      </div>

    </aside>

    <!-- ── Área principal ── -->
    <main>
      <div class="main-header">
        <h1 class="main-titulo">Catálogo</h1>
        <span id="contador-productos"></span>
      </div>

      <!-- Grilla — JS renderiza las cards acá -->
      <div id="grilla-productos"></div>

      <!-- Estado vacío — JS lo muestra si no hay resultados -->
      <div id="estado-vacio">
        <p>No hay productos con esos filtros.</p>
      </div>
    </main>

  </div>

  <!-- ── Modal de detalle ── -->
  <div class="modal-overlay" id="modal">
    <div class="modal-contenido">

      <!-- Cerrar -->
      <button class="modal-cerrar" id="modal-cerrar">✕</button>

      <!-- Columna izquierda: fotos -->
      <div class="modal-fotos">
        <div class="modal-foto-principal">
          <img id="modal-foto-grande" src="" alt="" />
          <button class="modal-flecha prev" id="modal-prev">‹</button>
          <button class="modal-flecha next" id="modal-next">›</button>
        </div>
        <div class="modal-miniaturas" id="modal-miniaturas"></div>
      </div>

      <!-- Columna derecha: info -->
      <div class="modal-info">
        <p class="modal-marca"    id="modal-marca"></p>
        <h2 class="modal-nombre"  id="modal-nombre"></h2>
        <p class="modal-color-tipo" id="modal-color-tipo"></p>
        <p class="modal-precio"   id="modal-precio"></p>

        <p class="modal-descripcion" id="modal-descripcion"></p>

        <div>
          <p class="modal-talles-label">Elegí tu talle</p>
          <div class="modal-talles-lista" id="modal-talles"></div>
        </div>

        <button class="modal-btn-whatsapp" id="modal-btn-whatsapp" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.116 1.522 5.847L.057 23.882l6.19-1.438A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.817 9.817 0 01-5.001-1.368l-.36-.214-3.664.851.882-3.551-.234-.374A9.787 9.787 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/>
          </svg>
          Consultar por WhatsApp
        </button>
      </div>

    </div>
  </div>

  <!-- ── Botón flotante filtrar (móvil) ── -->
  <button id="btn-filtrar-mobile">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
    </svg>
    Filtrar
  </button>

  <!-- ── Overlay bottom sheet ── -->
  <div id="filtros-sheet-overlay"></div>

  <!-- ── Bottom sheet de filtros ── -->
  <div id="filtros-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-titulo">Filtros</span>
      <button class="sheet-limpiar" id="sheet-limpiar">Limpiar todo</button>
    </div>

    <div class="sheet-filtros">
      <div class="filtro-seccion">
        <p class="filtro-titulo">Tipo</p>
        <ul class="filtro-lista" id="sheet-lista-tipo">
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="todos" data-sheet="true">Todos</button></li>
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="11"    data-sheet="true">Fútbol 11</button></li>
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="5"     data-sheet="true">Fútbol 5</button></li>
          <li><button class="filtro-btn" data-filtro="tipo" data-valor="Sala"  data-sheet="true">Futsal / Sala</button></li>
        </ul>
      </div>

      <div class="filtro-seccion">
        <p class="filtro-titulo">Marca</p>
        <ul class="filtro-lista" id="sheet-lista-marcas"></ul>
      </div>

      <div class="filtro-seccion" id="sheet-filtro-modelos">
        <p class="filtro-titulo">Modelo</p>
        <ul class="filtro-lista" id="sheet-lista-modelos"></ul>
      </div>
    </div>

    <button class="sheet-aplicar" id="sheet-aplicar">Ver resultados</button>
  </div>

  <!-- Datos -->
  <script src="products.js"></script>
  <script src="app.js"></script>

</body>
</html>
